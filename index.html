<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    border-radius:6px;
}

button:hover{
    background:red;
}

.sublist{
    display:none;
    margin-left:10px;
}

.sublist button{
    background:#222;
    font-size:13px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<body>

<header class="topbar">

    <div class="title">📺 DİJİTAL REKLAM TV</div>

    <div class="action" onclick="reklamVer()">
        📢 Reklam Ver / WhatsApp
    </div>

</header>

<div class="container">

<!-- MENU -->
<div class="menu">

    <h3>📂 Kategoriler</h3>

    <!-- ANA KATEGORİLER -->
    <button onclick="toggle('arabaList')">🚗 Otomobil</button>
    <div id="arabaList" class="sublist">
        <button onclick="playAd('araba',0)">BMW Reklam</button>
    </div>

    <button onclick="toggle('teknolojiList')">📱 Teknoloji</button>
    <div id="teknolojiList" class="sublist">
        <button onclick="playAd('teknoloji',0)">Telefon Reklam</button>
    </div>

    <button onclick="toggle('muzikList')">🎵 Müzik</button>
    <div id="muzikList" class="sublist">
        <button onclick="playAd('muzik',0)">Belalı Yarim</button>
    </div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

/* REKLAMLAR */
let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    muzik:["https://www.w3schools.com/html/movie.mp4"]
};

let currentCategory = "araba";
let index = 0;

/* SUB MENU AÇ/KAPA */
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

/* TEK REKLAM OYNAT */
function playAd(cat,i){
    currentCategory = cat;
    index = i;

    let video = document.getElementById("player");
    video.src = ads[cat][i];
    video.play();
}

/* WHATSAPP */
function reklamVer(){

    let mesaj =
`Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;

    let numara = "905074163605";

    window.open("https://wa.me/" + numara + "?text=" + encodeURIComponent(mesaj), "_blank");
}

</script>

</body>
</html>
