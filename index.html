<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* 🔥 SABİT HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

/* 🔥 TEK BUTON */
.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
}

button:hover{
    background:red;
}

/* 🔥 SUB MENU */
.sublist{
    display:none;
    margin-left:10px;
}

.sublist button{
    background:#222;
    font-size:13px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<body>

<!-- 🔥 HEADER -->
<header class="topbar">

    <div class="title">📺 DİJİTAL REKLAM TV</div>

    <div class="action" onclick="reklamVer()">
        📢 Reklam Ver / WhatsApp
    </div>

</header>

<div class="container">

<div class="menu">

    <h3>📂 Kategoriler</h3>

    <!-- TREND -->
    <button onclick="toggle('trendList')">🛍 TREND ÜRÜNLER</button>
    <div id="trendList" class="sublist">
        <button onclick="setCategory('trend')">Trend Reklam</button>
    </div>

    <!-- ARABA -->
    <button onclick="toggle('arabaList')">🚗 OTOMOBİL</button>
    <div id="arabaList" class="sublist">
        <button onclick="setCategory('araba')">Araba Reklam</button>
    </div>

    <!-- TEKNOLOJİ -->
    <button onclick="toggle('teknolojiList')">📱 TEKNOLOJİ</button>
    <div id="teknolojiList" class="sublist">
        <button onclick="setCategory('teknoloji')">Teknoloji Reklam</button>
    </div>

    <!-- YEREL -->
    <button onclick="toggle('yerelList')">🏪 YEREL</button>
    <div id="yerelList" class="sublist">
        <button onclick="setCategory('yerel')">Yerel Reklam</button>
    </div>

    <!-- MÜZİK -->
    <button onclick="toggle('muzikList')">🎵 MÜZİK</button>
    <div id="muzikList" class="sublist">
        <button onclick="setCategory('muzik')">Belalı Yarim</button>
    </div>

</div>

<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    trend:[],
    yerel:[],
    muzik:["https://www.w3schools.com/html/movie.mp4"]
};

let currentCategory = "araba";
let index = 0;

/* 🔥 AÇ KAPA */
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

/* 📂 KATEGORİ */
function setCategory(cat){
    currentCategory = cat;
    index = 0;
    play();
}

/* 📲 WHATSAPP */
function reklamVer(){

    let mesaj =
`Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;

    let numara = "905074163605";

    window.open("https://wa.me/" + numara + "?text=" + encodeURIComponent(mesaj), "_blank");
}

/* ▶️ PLAY */
function play(){

    let list = ads[currentCategory];
    let video = document.getElementById("player");

    if(list.length === 0){
        setTimeout(play, 2000);
        return;
    }

    video.src = list[index];
    video.play();

    video.onended = function(){
        index++;
        if(index >= list.length){
            index = 0;
        }
        play();
    }
}

play();

</script>

</body>
</html>
