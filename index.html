<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Reklam Online</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    width:100%;
    position:fixed;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* CATEGORY */
.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    margin-top:10px;
    cursor:pointer;
    border-radius:6px;
}

.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.submenu div{
    background:#222;
    margin-top:5px;
    padding:10px;
    cursor:pointer;
    border-radius:6px;
}

.submenu div:hover{
    background:green;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">📺 REKLAM ONLINE</div>
    <div class="action" onclick="reklamVer()">📢 Reklam Ver</div>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">

<div class="category">
<button onclick="toggleMenu(this)">🛍 TREND ÜRÜNLER</button>
<div class="submenu">
    <div onclick="playAd('trend',0)">Trend Reklam 1</div>
    <div onclick="playAd('trend',1)">Trend Reklam 2</div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🚗 OTOMOBİL</button>
<div class="submenu">
    <div onclick="playAd('araba',0)">Araba Reklam 1</div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🎵 MÜZİK</button>
<div class="submenu">
    <div onclick="playAd('muzik',0)">Müzik Reklam 1</div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🏪 YEREL FİRMA</button>
<div class="submenu">
    <div onclick="playAd('yerel',0)">Firma Reklam 1</div>
</div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" controls autoplay muted></video>
</div>

</div>

<script>

/* 🔥 REKLAM VERİLERİ */
let ads = {
    trend:[
        "https://www.w3schools.com/html/movie.mp4",
        "https://www.w3schools.com/html/mov_bbb.mp4"
    ],
    araba:[
        "https://www.w3schools.com/html/movie.mp4"
    ],
    muzik:[
        "https://www.w3schools.com/html/mov_bbb.mp4"
    ],
    yerel:[
        "https://www.w3schools.com/html/movie.mp4"
    ]
};

let currentCategory = "trend";

/* ▶️ OYNAT */
function playAd(cat,index){
    currentCategory = cat;

    let video = document.getElementById("player");

    video.src = ads[cat][index];
    video.play();
}

/* 📂 MENU AÇ/KAPA */
function toggleMenu(btn){
    let menu = btn.nextElementSibling;
    menu.style.maxHeight = menu.style.maxHeight ? null : menu.scrollHeight + "px";
}

/* 📢 WHATSAPP */
function reklamVer(){
    let msg = "Merhaba, reklam vermek istiyorum. Kategori: " + currentCategory;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
