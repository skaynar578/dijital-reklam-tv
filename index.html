<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>reklam online</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* KATEGORİ */
.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* ALT MENÜ */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

/* UPLOAD BOX */
.upload-box{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    color:#bbb;
    font-size:14px;
    text-align:center;
    border:1px dashed #444;
}

.upload-box input{
    width:100%;
    color:white;
}

/* VIDEO */
video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<body>

<header class="topbar">
    <div class="title">📺 reklam online DİJİTAL REKLAM</div>
    <div class="action" onclick="reklamVer()">📢 Reklam Ver / WhatsApp</div>
</header>

<div class="container">

<div class="menu">

<!-- KATEGORİLER -->

<div class="category">
<button onclick="toggleMenu(this)">🛍 TREND ÜRÜNLER</button>
<div class="submenu">
    <div class="upload-box">
        <input type="file" accept="video/*">
    </div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🚗 OTOMOBİL ALIM-SATIM</button>
<div class="submenu">
    <div class="upload-box">
        <input type="file" accept="video/*">
    </div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">📱 TEKNOLOJİ ÜRÜNLERİ</button>
<div class="submenu">
    <div class="upload-box">
        <input type="file" accept="video/*">
    </div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🏪 YEREL FİRMA İLANLARI</button>
<div class="submenu">
    <div class="upload-box">
        <input type="file" accept="video/*">
    </div>
</div>
</div>

<div class="category">
<button onclick="toggleMenu(this)">🎵 MÜZİK PİYASASI</button>
<div class="submenu">
    <div class="upload-box">
        <input type="file" accept="video/*">
    </div>
</div>
</div>

</div>

<!-- EKRAN -->
<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

function toggleMenu(btn){
    let menu = btn.nextElementSibling;

    if(menu.style.maxHeight){
        menu.style.maxHeight = null;
    } else {
        menu.style.maxHeight = menu.scrollHeight + "px";
    }
}

// WHATSAPP
let currentCategory = "trend";

function reklamVer(){
    let mesaj = `Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj));
}

// ADS (örnek videolar)
let ads = {
    trend:["https://www.w3schools.com/html/mov_bbb.mp4"],
    araba:["https://www.w3schools.com/html/movie.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"]
};

let index = 0;

// PLAY
function play(cat){
    let video = document.getElementById("player");
    currentCategory = cat;

    let list = ads[cat];
    if(!list) return;

    video.src = list[index];
    video.play();
}

play("trend");

</script>

</body>
</html>
