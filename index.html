<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CATEGORY */
.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

/* UPLOAD */
.upload-box{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px dashed #444;
    text-align:center;
}

.upload-btn{
    display:block;
    background:#444;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}
.upload-btn:hover{
    background:green;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">📺 Dijital Reklam TV</div>
    <div class="action" onclick="reklamVer()">WhatsApp</div>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">

<!-- TREND -->
<div class="category">
<button onclick="toggle(this)">🛍 TREND ÜRÜNLER</button>
<div class="submenu">

<div class="upload-box">
<label class="upload-btn">
📤 Video Yükle
<input type="file" accept="video/*" hidden onchange="upload(event,'trend')">
</label>
</div>

<div onclick="play('trend',0)">🔥 Trend 1</div>

</div>
</div>

<!-- ARABA -->
<div class="category">
<button onclick="toggle(this)">🚗 OTOMOBİL</button>
<div class="submenu">

<div class="upload-box">
<label class="upload-btn">
📤 Video Yükle
<input type="file" accept="video/*" hidden onchange="upload(event,'araba')">
</label>
</div>

<div onclick="play('araba',0)">🚗 Araba 1</div>

</div>
</div>

<!-- MÜZİK -->
<div class="category">
<button onclick="toggle(this)">🎵 MÜZİK</button>
<div class="submenu">

<div class="upload-box">
<label class="upload-btn">
📤 Video Yükle
<input type="file" accept="video/*" hidden onchange="upload(event,'muzik')">
</label>
</div>

<div onclick="play('muzik',0)">🎵 Klip 1</div>

</div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
<video id="player" controls autoplay playsinline></video>
</div>

</div>

<script>

let ads = {
    trend: [],
    araba: [],
    muzik: []
};

let current = "trend";
let index = 0;

/* MENU */
function toggle(btn){
    let s = btn.nextElementSibling;
    s.style.maxHeight = s.style.maxHeight ? null : s.scrollHeight + "px";
}

/* UPLOAD */
function upload(e, cat){
    let file = e.target.files[0];
    if(!file) return;

    let url = URL.createObjectURL(file);
    ads[cat].push(url);

    current = cat;
    index = ads[cat].length - 1;

    play(cat,index);
}

/* PLAY */
function play(cat,i){
    current = cat;
    index = i;

    let video = document.getElementById("player");
    video.src = ads[cat][i];
    video.play();
}

/* WHATSAPP */
function reklamVer(){
    let msg = "Reklam vermek istiyorum. Kategori: " + current;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
