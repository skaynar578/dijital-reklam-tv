<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Reklam Online</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    padding-top:60px;
}

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{font-size:20px;font-weight:bold;}
.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

.menu{
    width:30%;
    background:#1a1a1a;
    overflow-y:auto;
    padding:10px;
}

.screen{
    width:70%;
    display:flex;
    align-items:center;
    justify-content:center;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CATEGORY STYLE */
h3{
    background:#333;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.track-list{
    display:none;
    padding:10px;
    background:#222;
    border-radius:6px;
    margin-top:5px;
}

.item{
    background:#111;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    cursor:pointer;
}

.item:hover{
    background:green;
}

.upload{
    margin-top:10px;
    background:#000;
    padding:8px;
    border:1px dashed #555;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">📺 Reklam Online</div>
    <div class="action" onclick="whatsapp()">📢 WhatsApp</div>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">

<!-- KATEGORİ 1 -->
<h3 onclick="toggleList('trend')">
    🎤 Trend Ürünler
</h3>

<div class="track-list" id="trend">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'trend')">
</div>

</div>

<!-- KATEGORİ 2 -->
<h3 onclick="toggleList('araba')">
    🚗 Otomobil
</h3>

<div class="track-list" id="araba">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'araba')">
</div>

</div>

<!-- KATEGORİ 3 -->
<h3 onclick="toggleList('muzik')">
    🎵 Müzik Piyasası
</h3>

<div class="track-list" id="muzik">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'muzik')">
</div>

</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" controls autoplay playsinline></video>
</div>

</div>

<script>

let videos = {
    trend: [],
    araba: [],
    muzik: []
};

let current = "trend";

/* AÇ-KAPA */
function toggleList(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

/* YÜKLE */
function upload(e,cat){
    let file = e.target.files[0];
    if(!file) return;

    let url = URL.createObjectURL(file);

    videos[cat].push(url);

    addItem(cat, url, videos[cat].length - 1);
}

/* LİSTEYE EKLE */
function addItem(cat,url,index){
    let box = document.getElementById(cat);

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "▶ Video " + (index + 1);

    div.onclick = function(){
        play(cat,index);
    };

    box.appendChild(div);
}

/* OYNAT */
function play(cat,i){
    current = cat;

    let video = document.getElementById("player");
    video.src = videos[cat][i];
    video.play();
}

/* WHATSAPP */
function whatsapp(){
    let msg = "Reklam vermek istiyorum kategori: " + current;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
