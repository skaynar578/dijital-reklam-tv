<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    display:flex;
    height:100vh;
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
}

button:hover{
    background:red;
}

.dropdown-content{
    display:block;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* 🔥 WhatsApp butonu */
.whatsapp-btn{
    background:green !important;
    font-weight:bold;
}
</style>
</head>

<body>

<header>📺 DİJİTAL REKLAM TV</header>

<div class="container">

<div class="menu">

    <h3>📂 Kategoriler</h3>

    <button onclick="setCategory('araba')">🚗 Araba</button>
    <button onclick="setCategory('teknoloji')">📱 Teknoloji</button>
    <button onclick="setCategory('trend')">🛍 Trend Ürün</button>
    <button onclick="setCategory('yerel')">🏪 Yerel</button>
    <button onclick="setCategory('muzik')">🎵 Müzik</button>

    <hr>

    <button onclick="setCategory('mobilya')">🪑 Mobilya</button>
    <button onclick="setCategory('aksesuar')">⌚ Aksesuar</button>
    <button onclick="setCategory('giyim')">👕 Giyim</button>
    <button onclick="setCategory('taki')">💍 Takı</button>
    <button onclick="setCategory('canta')">👜 Çanta</button>
    <button onclick="setCategory('servis')">🛠 Servis</button>
    <button onclick="setCategory('dekorasyon')">🏠 Dekorasyon</button>
    <button onclick="setCategory('tamir')">🔧 Tamir</button>
    <button onclick="setCategory('nakliye')">🚚 Nakliye</button>
    <button onclick="setCategory('uretim')">🏭 Üretim</button>
    <button onclick="setCategory('market')">🛒 Market</button>
    <button onclick="setCategory('kisisel')">🧑 Kişisel</button>

    <hr>

    <!-- 🔥 WHATSAPP REKLAM BUTONU -->
    <button class="whatsapp-btn" onclick="reklamVer()">
        📢 Reklam Ver (WhatsApp)
    </button>

    <p style="font-size:12px;">
        Reklamlar kategoriye göre oynatılır.
    </p>

</div>

<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

function setCategory(cat){
    currentCategory = cat;
    index = 0;
    play();
}

// 📲 WHATSAPP REKLAM SİSTEMİ
function reklamVer(){

    let mesaj = "Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.%0A%0AKategori: " + currentCategory;

    let numara = "905074163605"; // senin numaran

    window.open("https://wa.me/" + numara + "?text=" + mesaj, "_blank");
}


// 🎥 REKLAM VERİLERİ
let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    trend:[],
    yerel:[],
    muzik:["https://www.w3schools.com/html/movie.mp4"],

    mobilya:[],
    aksesuar:[],
    giyim:[],
    taki:[],
    canta:[],
    servis:[],
    dekorasyon:[],
    tamir:[],
    nakliye:[],
    uretim:[],
    market:[],
    kisisel:[]
};

let currentCategory = "araba";
let index = 0;

function play(){
    let list = ads[currentCategory];
    let video = document.getElementById("player");

    if(list.length === 0){
        setTimeout(play, 2000);
        return;
    }

    video.src = list[index];
    video.play();

    video.onended = function(){
        index++;
        if(index >= list.length){
            index = 0;
        }
        play();
    }
}

play();

</script>

</body>
</html>
