<!DOCTYPE html>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* CATEGORY */
.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* SUBMENU */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

/* ITEM */
.item{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.item:hover{
    background:green;
}

/* UPLOAD */
.upload{
    background:#111;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px dashed #444;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

</div>

<script>

let ads = {};
let current = null;

function toggle(btn){
    let menu = btn.nextElementSibling;
    menu.style.maxHeight = menu.style.maxHeight ? null : menu.scrollHeight + "px";
}

function upload(e,cat){
    let file = e.target.files[0];
    if(!file) return;

    if(!ads[cat]) ads[cat] = [];

    let url = URL.createObjectURL(file);
    ads[cat].push(url);

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "▶ Video";
    div.onclick = () => play(cat, ads[cat].length-1);

    document.getElementById(cat).appendChild(div);

    play(cat, ads[cat].length-1);
}

function play(cat,i){
    current = cat;
    let video = document.getElementById("player");

    if(!ads[cat] || ads[cat].length === 0) return;

    video.src = ads[cat][i];
    video.play();
}

function reklamVer(){
    window.open("https://wa.me/905074163605");
}

</script>
